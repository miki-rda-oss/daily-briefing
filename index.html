<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 朝のブリーフィング</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f2f5; color: #1a202c; line-height: 1.75; }

  .hero { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); color: white; padding: 32px 20px 28px; }
  .hero-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
  .hero-date { font-size: 0.85rem; opacity: 0.85; margin-top: 6px; }

  .container { max-width: 720px; margin: 0 auto; padding: 16px 12px 40px; }

  .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

  h1 { display: none; }
  h2 { font-size: 1rem; font-weight: 700; color: #f7971e; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid #f0f2f5; display: flex; align-items: center; gap: 6px; }
  h3 { font-size: 0.92rem; font-weight: 700; color: #4a5568; margin: 14px 0 8px; background: #f7fafc; padding: 6px 10px; border-radius: 8px; }

  p { font-size: 0.9rem; margin-bottom: 6px; color: #2d3748; }
  ul { list-style: none; padding: 0; }
  li { font-size: 0.9rem; padding: 5px 0 5px 16px; border-bottom: 1px solid #f7fafc; position: relative; color: #2d3748; }
  li::before { content: '·'; position: absolute; left: 4px; color: #f7971e; font-weight: bold; }
  li.num::before { display: none; }
  li.num { padding-left: 4px; }
  li.check::before { display: none; }
  li.check { padding-left: 4px; }
  .checkbox { margin-right: 6px; color: #a0aec0; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 4px; }
  th { background: #f7fafc; padding: 8px 10px; text-align: left; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
  td { padding: 8px 10px; border-bottom: 1px solid #f0f2f5; vertical-align: top; color: #2d3748; }
  tr:hover td { background: #f7fafc; }

  hr { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
  strong { color: #1a202c; }

  .section-wrap { }
  .updated { text-align: center; font-size: 0.75rem; color: #a0aec0; margin-top: 24px; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-title">☀️ 朝のブリーフィング</div>
  <div class="hero-date">2026-06-29</div>
</div>
<div class="container">
  <div class="card section-wrap">
    <p>API Error: The socket connection was closed unexpectedly. For more information, pass `verbose: true` in the second argument to fetch()</p>

  </div>
  <div class="updated">最終更新: 2026/6/29 7:43:27</div>
</div>
</body>
</html>
